<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>RAM Rush: Storage Panic - Beta 0.1.0</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #020617;
      color: white;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
      user-select: none;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #0f172a;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const VERSION = "Beta 0.1.0";
    const DESIGN_W = 640;
    const DESIGN_H = 900;

    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;

    const lanes = [180, 320, 460];

    const game = {
      started: false,
      over: false,
      score: 0,
      combo: 0,
      lane: 1,
      playerY: 720,
      free: 1.36,
      total: 29.5,
      heat: 45,
      spawnTimer: 0,
      spawnDelay: 0.75,
      files: [],
      particles: [],
      lastTime: performance.now(),
      message: "Touch to boot cleaner.exe"
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      scale = Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
      offsetX = (window.innerWidth - DESIGN_W * scale) / 2;
      offsetY = (window.innerHeight - DESIGN_H * scale) / 2;
    }

    function toGamePos(clientX, clientY) {
      return {
        x: (clientX - offsetX) / scale,
        y: (clientY - offsetY) / scale
      };
    }

    function resetGame() {
      game.started = true;
      game.over = false;
      game.score = 0;
      game.combo = 0;
      game.lane = 1;
      game.free = 1.36;
      game.total = 29.5;
      game.heat = 45;
      game.spawnTimer = 0;
      game.spawnDelay = 0.75;
      game.files = [];
      game.particles = [];
      game.message = "Ổ C còn 1.36 GB. Dọn ngay!";
    }

    function handleInput(clientX, clientY) {
      if (!game.started || game.over) {
        resetGame();
        return;
      }

      const p = toGamePos(clientX, clientY);
      if (p.x < DESIGN_W / 2) {
        game.lane = Math.max(0, game.lane - 1);
      } else {
        game.lane = Math.min(2, game.lane + 1);
      }
    }

    window.addEventListener("resize", resize);

    window.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      handleInput(e.clientX, e.clientY);
    }, { passive: false });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") {
        game.lane = Math.max(0, game.lane - 1);
      }
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") {
        game.lane = Math.min(2, game.lane + 1);
      }
      if (e.key === " " || e.key === "Enter") {
        if (!game.started || game.over) resetGame();
      }
    });

    function spawnFile() {
      const fullness = clamp(1 - game.free / game.total, 0, 1);
      const r = Math.random();
      let kind = "tmp";

      if (r < 0.08 + fullness * 0.25) kind = "virus";
      else if (r > 0.78) kind = "gb";
      else if (r > 0.66) kind = "zip";

      game.files.push({
        lane: Math.floor(Math.random() * 3),
        y: -50,
        speed: 230 + Math.random() * 120 + fullness * 140,
        kind,
        hit: false,
        wobble: Math.random() * Math.PI * 2
      });
    }

    function collect(file) {
      file.hit = true;

      if (file.kind === "gb") {
        game.free = Math.min(game.total, game.free + 0.18);
        game.heat = Math.max(0, game.heat - 2);
        game.score += 100 + game.combo * 10;
        game.combo += 1;
        game.message = "+0.18 GB recovered";
        burst(lanes[file.lane], file.y, "#22c55e");
      } else if (file.kind === "zip") {
        game.free = Math.min(game.total, game.free + 0.35);
        game.heat = Math.max(0, game.heat - 3.5);
        game.score += 180 + game.combo * 15;
        game.combo += 2;
        game.message = "ZIP compressed +0.35 GB";
        burst(lanes[file.lane], file.y, "#a855f7");
      } else if (file.kind === "virus") {
        game.free = Math.max(0, game.free - 0.55);
        game.heat += 8;
        game.combo = 0;
        game.message = "VIRUS HIT!";
        burst(lanes[file.lane], file.y, "#ef4444");
      } else {
        game.free = Math.max(0, game.free - 0.18);
        game.heat += 3;
        game.combo = 0;
        game.message = "TMP crashed into cleaner";
        burst(lanes[file.lane], file.y, "#f97316");
      }
    }

    function burst(x, y, color) {
      for (let i = 0; i < 12; i++) {
        game.particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 220,
          vy: (Math.random() - 0.5) * 220,
          life: 0.45,
          color
        });
      }
    }

    function update(dt) {
      if (!game.started || game.over) return;

      const fullness = clamp(1 - game.free / game.total, 0, 1);
      game.spawnTimer -= dt;
      game.spawnDelay = Math.max(0.20, 0.82 - fullness * 0.46);

      if (game.spawnTimer <= 0) {
        spawnFile();
        game.spawnTimer = game.spawnDelay;
      }

      game.free -= dt * (0.025 + fullness * 0.05);
      game.heat += dt * (1.5 + fullness * 3.2);

      for (const file of game.files) {
        file.y += file.speed * dt;
        file.wobble += dt * 5;

        if (!file.hit && Math.abs(file.y - game.playerY) < 38 && file.lane === game.lane) {
          collect(file);
        }
      }

      game.files = game.files.filter(f => f.y < DESIGN_H + 90 && !f.hit);

      for (const p of game.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 360 * dt;
        p.life -= dt;
      }
      game.particles = game.particles.filter(p => p.life > 0);

      if (game.free <= 0 || game.heat >= 100) {
        game.free = Math.max(0, game.free);
        game.heat = Math.min(100, game.heat);
        game.over = true;
        game.message = "Windows.exe has stopped breathing";
      }
    }

    function draw() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);

      drawBackground();
      drawLanes();
      drawFiles();
      drawPlayer();
      drawParticles();
      drawUI();

      if (!game.started) drawStart();
      if (game.over) drawGameOver();

      ctx.restore();
    }

    function drawBackground() {
      const grd = ctx.createLinearGradient(0, 0, 0, DESIGN_H);
      grd.addColorStop(0, "#0f172a");
      grd.addColorStop(1, "#020617");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

      ctx.strokeStyle = "rgba(59,130,246,0.25)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 20; i++) {
        const y = i * 55;
        ctx.beginPath();
        ctx.moveTo(70, y);
        ctx.lineTo(570, y + 25);
        ctx.stroke();
      }

      ctx.fillStyle = "rgba(255,255,255,0.055)";
      ctx.font = "bold 28px monospace";
      ctx.textAlign = "center";
      ctx.fillText("C: SYSTEM CRISIS", DESIGN_W / 2, 280);
    }

    function drawLanes() {
      for (const x of lanes) {
        ctx.strokeStyle = "rgba(148,163,184,0.35)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, DESIGN_H);
        ctx.stroke();
      }
    }

    function drawPlayer() {
      const x = lanes[game.lane];
      const y = game.playerY;

      ctx.save();
      ctx.shadowColor = "#38bdf8";
      ctx.shadowBlur = 20;
      ctx.fillStyle = "#0284c7";
      ctx.beginPath();
      ctx.arc(x, y, 36, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#e0f2fe";
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "white";
      ctx.font = "bold 14px monospace";
      ctx.textAlign = "center";
      ctx.fillText("CLEAN", x, y + 60);
      ctx.restore();
    }

    function drawFiles() {
      for (const file of game.files) {
        const x = lanes[file.lane] + Math.sin(file.wobble) * 4;
        const y = file.y;
        let color = "#f97316";
        let label = "TMP";

        if (file.kind === "gb") {
          color = "#22c55e";
          label = "+GB";
        } else if (file.kind === "zip") {
          color = "#a855f7";
          label = "ZIP";
        } else if (file.kind === "virus") {
          color = "#ef4444";
          label = "VIR";
        }

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.sin(file.wobble) * 0.08);
        roundRect(-28, -28, 56, 56, 8, color);
        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        ctx.lineWidth = 3;
        ctx.strokeRect(-28, -28, 56, 56);
        ctx.fillStyle = "white";
        ctx.font = "bold 17px monospace";
        ctx.textAlign = "center";
        ctx.fillText(label, 0, 6);
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of game.particles) {
        ctx.globalAlpha = Math.max(0, p.life / 0.45);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
        ctx.globalAlpha = 1;
      }
    }

    function drawUI() {
      const freePct = clamp(game.free / game.total, 0, 1);
      const heatPct = clamp(game.heat / 100, 0, 1);

      ctx.fillStyle = "rgba(0,0,0,0.35)";
      roundRect(18, 18, 604, 172, 18, "rgba(2,6,23,0.72)");

      ctx.fillStyle = "white";
      ctx.font = "bold 22px Arial";
      ctx.textAlign = "left";
      ctx.fillText("RAM Rush: Storage Panic", 34, 52);
      ctx.font = "15px monospace";
      ctx.fillStyle = "#93c5fd";
      ctx.fillText(VERSION, 34, 78);

      ctx.fillStyle = "white";
      ctx.font = "18px Arial";
      ctx.fillText("Score: " + Math.floor(game.score) + "   Combo x" + game.combo, 34, 108);

      drawBar(34, 126, 285, 18, freePct, freePct < 0.18 ? "#ef4444" : "#22c55e");
      ctx.fillStyle = "white";
      ctx.font = "14px monospace";
      ctx.fillText("C: " + game.free.toFixed(2) + " GB / " + game.total + " GB", 34, 164);

      drawBar(336, 126, 250, 18, heatPct, "#f97316");
      ctx.fillText("Heat: " + Math.floor(game.heat) + "°C", 336, 164);

      ctx.fillStyle = "rgba(2,6,23,0.72)";
      roundRect(18, 828, 604, 52, 16, "rgba(2,6,23,0.72)");
      ctx.fillStyle = "#cbd5e1";
      ctx.font = "16px Arial";
      ctx.textAlign = "center";
      ctx.fillText(game.message, DESIGN_W / 2, 861);
    }

    function drawBar(x, y, w, h, pct, color) {
      roundRect(x, y, w, h, 9, "#334155");
      roundRect(x, y, w * pct, h, 9, color);
    }

    function drawStart() {
      ctx.fillStyle = "rgba(2,6,23,0.78)";
      ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);
      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "bold 42px Arial";
      ctx.fillText("RAM RUSH", DESIGN_W / 2, 340);
      ctx.font = "bold 24px Arial";
      ctx.fillText("Storage Panic", DESIGN_W / 2, 376);
      ctx.font = "18px Arial";
      ctx.fillStyle = "#cbd5e1";
      ctx.fillText("Ổ C còn 1.36 GB. Máy sắp cháy.", DESIGN_W / 2, 430);
      ctx.fillText("Chạm trái/phải để đổi làn.", DESIGN_W / 2, 462);
      ctx.fillText("Ăn +GB / ZIP. Tránh VIR / TMP.", DESIGN_W / 2, 494);
      ctx.fillStyle = "#fef3c7";
      ctx.fillText("Touch to start", DESIGN_W / 2, 560);
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(127,29,29,0.76)";
      ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);
      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "bold 42px Arial";
      ctx.fillText("MÁY ĐÃ CHÁY", DESIGN_W / 2, 390);
      ctx.font = "22px monospace";
      ctx.fillText("Score: " + Math.floor(game.score), DESIGN_W / 2, 438);
      ctx.font = "18px Arial";
      ctx.fillStyle = "#fecaca";
      ctx.fillText("Touch to restart", DESIGN_W / 2, 500);
    }

    function roundRect(x, y, w, h, r, fill) {
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - game.lastTime) / 1000);
      game.lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    resize();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
